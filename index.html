<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Analizador de Elipses Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e3a5f;
  --accent:#3b82f6; --accent2:#60a5fa; --gold:#f59e0b;
  --text:#e2e8f0; --muted:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background-color:#0a0e1a;color:#e2e8f0;font-family:'Lato',sans-serif;min-height:100vh;padding:15px}
.wrap{max-width:600px;margin:10px auto;position:relative;z-index:2}
header{text-align:center;margin-bottom:25px;margin-top:10px}
.badge{display:inline-block;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:var(--accent2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:8px}
h1{font-family:'Playfair Display',serif;font-size:2rem;color:#e2e8f0;margin-bottom:5px}
.subtitle{color:var(--muted);font-size:13px}

.input-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px}
.input-card label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px}
.input-row{display:flex;gap:8px;flex-direction:column}
.eq-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);outline:none}
.btn-main{width:100%;background:linear-gradient(135deg,#2563eb,#3b82f6);border:none;border-radius:8px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.chips{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer}
.err{margin-top:12px;padding:9px 12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#fca5a5;font-size:12px;display:none}

.export-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.btn-exp{padding:12px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;text-align:center}
.btn-exp:disabled{opacity:.35}
.btn-png{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);color:#34d399}
.btn-pdf{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#fbbf24}

#results{display:none}
.type-banner{text-align:center;margin-bottom:15px}
.type-tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.tag-h{background:rgba(16,185,129,0.2);color:#34d399}
.tag-v{background:rgba(245,158,11,0.2);color:#fbbf24}
.eq-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;margin-bottom:15px}
.eq-box .eql{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.eq-box .eqv{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent2)}
.canvas-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:15px;display:flex;justify-content:center}
canvas{border-radius:6px;background:#111827;width:100%;height:auto;max-width:500px}

/* Cuadrícula optimizada para 4 columnas (a, b, c, e) */
.vals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:15px}
.val-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 4px;text-align:center}
.vbn{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--accent2);font-weight:bold}
.vbl{font-size:8px;color:var(--muted);text-transform:uppercase;margin-top:2px;margin-bottom:2px}
.vbv{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold)}

.cards-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.card .cl{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.card .cv{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5}
.card .cv .co{color:var(--accent2)}
.card .cv .hl{color:var(--gold)}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="wrap">
<header>
  <div class="badge">App Móvil Corregida</div>
  <h1>Analizador de Elipses</h1>
  <p class="subtitle">Unidad Educativa Villa Cruz · Cobija</p>
</header>

<div class="input-card">
  <label>Ecuación de la Elipse</label>
  <div class="input-row">
    <input id="eqIn" class="eq-input" type="text" autocomplete="off" placeholder="Ej: 4x^2 + 9y^2 = 36" />
    <button class="btn-main" onclick="analizar()">Analizar Ecuación</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="setEq('4x^2 + 9y^2 = 36')">4x²+9y²=36</span>
    <span class="chip" onclick="setEq('x^2/25 + y^2/9 = 1')">Ordinaria H</span>
    <span class="chip" onclick="setEq('4x^2 + 9y^2 - 16x + 18y - 11 = 0')">General Completa</span>
  </div>
  <div class="err" id="errMsg"></div>
</div>

<div class="export-bar">
  <button class="btn-exp btn-png" id="btnPNG" disabled onclick="exportPNG()">Guardar Imagen</button>
  <button class="btn-exp btn-pdf" id="btnPDF" disabled onclick="exportPDF()">Guardar PDF</button>
</div>

<div id="results">
  <div class="type-banner"><span class="type-tag" id="typeBanner"></span></div>
  <div class="eq-box"><div class="eql">Forma Estándar (Ordinaria)</div><div class="eqv" id="stdEq"></div></div>
  <div class="canvas-wrap"><canvas id="cv" width="600" height="400"></canvas></div>
  <div class="vals-grid" id="valsGrid"></div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
  });
}

const r2 = v => Math.round(v * 100) / 100;
const fmt = v => { const n = r2(v); return Object.is(n, -0) ? "0" : n.toString(); };
const fc = (x,y) => `(${fmt(x)}, ${fmt(y)})`;
function setEq(s){ document.getElementById('eqIn').value=s; analizar(); }

function norm(eq){
  return eq.replace(/\s+/g,'').replace(/²/g,'^2').replace(/−/g,'-').replace(/×/g,'*').toLowerCase();
}

function parseEllipse(raw){
  const eq = norm(raw);
  if(eq.match(/=\s*1\s*$/)){
    const lhs = eq.replace(/=\s*1\s*$/,'');
    const terms = lhs.split('+');
    if(terms.length===2){
      let xDen,yDen,h=0,k=0;
      for(const t of terms){
        const xm = t.match(/^\(?x([+\-]\d*\.?\d*)?\)?\^2\s*\/\s*(\d+\.?\d*)$/);
        const ym = t.match(/^\(?y([+\-]\d*\.?\d*)?\)?\^2\s*\/\s*(\d+\.?\d*)$/);
        if(xm){ h=-(xm[1]?parseFloat(xm[1]):0); xDen=parseFloat(xm[2]); }
        else if(ym){ k=-(ym[1]?parseFloat(ym[1]):0); yDen=parseFloat(ym[2]); }
      }
      if(xDen!=null && yDen!=null && xDen>0 && yDen>0){
        if(Math.abs(xDen-yDen)<1e-9) throw new Error('Es una circunferencia (a = b).');
        return build(h,k,xDen,yDen);
      }
    }
  }

  const idx=eq.indexOf('=');
  if(idx===-1) throw new Error('Falta el signo "=" en la ecuación.');
  const lhs=eq.substring(0,idx);
  const rhs=parseFloat(eq.substring(idx+1))||0;
  
  let A=0,C=0,D=0,E=0,F=0;
  const tokens = lhs.match(/[+\-]?([^+\-]+)/g) || [];
  
  for(const tok of tokens){
    if(tok.includes('x^2')) A += parseFloat(tok.replace('x^2','')) || (tok.startsWith('-') ? -1 : 1);
    else if(tok.includes('y^2')) C += parseFloat(tok.replace('y^2','')) || (tok.startsWith('-') ? -1 : 1);
    else if(tok.includes('x') && !tok.includes('^')) D += parseFloat(tok.replace('x','')) || (tok.startsWith('-') ? -1 : 1);
    else if(tok.includes('y') && !tok.includes('^')) E += parseFloat(tok.replace('y','')) || (tok.startsWith('-') ? -1 : 1);
    else F += parseFloat(tok) || 0;
  }
  
  // Ajuste crucial: Pasar el término del miembro derecho al izquierdo de forma correcta
  F = F - rhs;

  if(A===0 || C===0) throw new Error('Faltan coeficientes cuadráticos válidos (A o C).');
  if(A*C<=0) throw new Error('Los signos de x² e y² deben ser iguales.');
  if(Math.abs(A-C)<1e-9) throw new Error('Es una circunferencia (A = C).');
  
  const h=-D/(2*A), k=-E/(2*C);
  const rhs2=-F+(D*D)/(4*A)+(E*E)/(4*C);
  if(rhs2<=0) throw new Error('La ecuación no corresponde a una elipse real o posee radios imaginarios.');
  
  return build(h,k,rhs2/A,rhs2/C);
}

function build(h,k,xDen,yDen){
  const hor=xDen>yDen;
  const a2=hor?xDen:yDen, b2=hor?yDen:xDen;
  const a=Math.sqrt(a2), b=Math.sqrt(b2), c=Math.sqrt(a2-b2);
  const e=c/a, lr=(2*b2)/a;
  
  const V1=hor?[h-a,k]:[h,k-a], V2=hor?[h+a,k]:[h,k+a];
  const B1=hor?[h,k-b]:[h-b,k], B2=hor?[h,k+b]:[h+b,k];
  const F1=hor?[h-c,k]:[h,k-c], F2=hor?[h+c,k]:[h,k+c];
  
  const hs=h===0?'x':(h>0?`(x−${fmt(h)})`:`(x+${fmt(Math.abs(h))})`);
  const ks=k===0?'y':(k>0?`(y−${fmt(k)})`:`(y+${fmt(Math.abs(k))})`);
  const stdEq=hor?`${hs}²/${fmt(a2)} + ${ks}²/${fmt(b2)} = 1` : `${hs}²/${fmt(b2)} + ${ks}²/${fmt(a2)} = 1`;
  
  return {hor,h,k,a,b,c,e,lr,vertices:[V1,V2],exMinor:[B1,B2],foci:[F1,F2],stdEq};
}

function analizar(){
  const raw=document.getElementById('eqIn').value.trim();
  const errEl=document.getElementById('errMsg'); errEl.style.display='none';
  if(!raw) return;
  try {
    const data=parseEllipse(raw);
    window._D=data;
    renderResults(data);
  } catch(e) {
    errEl.textContent='⚠ '+e.message; errEl.style.display='block';
    document.getElementById('results').style.display='none';
  }
}

function renderResults(d){
  document.getElementById('results').style.display='block';
  const ban=document.getElementById('typeBanner');
  ban.textContent=d.hor?'Elipse Horizontal':'Elipse Vertical';
  ban.className='type-tag '+(d.hor?'tag-h':'tag-v');
  document.getElementById('stdEq').textContent=d.stdEq;

  // Modificado: Ahora incluye la columna para el valor de 'c' de forma explícita
  document.getElementById('valsGrid').innerHTML=`
    <div class="val-box"><div class="vbn">a</div><div class="vbl">Eje Mayor</div><div class="vbv">${fmt(d.a)}</div></div>
    <div class="val-box"><div class="vbn">b</div><div class="vbl">Eje Menor</div><div class="vbv">${fmt(d.b)}</div></div>
    <div class="val-box"><div class="vbn">c</div><div class="vbl">Dist. Focal</div><div class="vbv">${fmt(d.c)}</div></div>
    <div class="val-box"><div class="vbn">e</div><div class="vbl">Excent.</div><div class="vbv">${fmt(d.e)}</div></div>`;

  // Modificado: Se añadieron las coordenadas de B1 y B2 explícitamente en una tarjeta dedicada
  document.getElementById('cardsGrid').innerHTML=`
    <div class="card"><div class="cl">Centro</div><div class="cv"><span class="co">${fc(d.h,d.k)}</span></div></div>
    <div class="card"><div class="cl">Vértices del Eje Mayor (V)</div><div class="cv">V₁=<span class="co">${fc(...d.vertices[0])}</span> | V₂=<span class="co">${fc(...d.vertices[1])}</span></div></div>
    <div class="card"><div class="cl">Extremos del Eje Menor (B)</div><div class="cv">B₁=<span class="co">${fc(...d.exMinor[0])}</span> | B₂=<span class="co">${fc(...d.exMinor[1])}</span></div></div>
    <div class="card"><div class="cl">Focos (F)</div><div class="cv">F₁=<span class="co">${fc(...d.foci[0])}</span> | F₂=<span class="co">${fc(...d.foci[1])}</span></div></div>
    <div class="card"><div class="cl">Lado Recto</div><div class="cv">Longitud = <span class="hl">${fmt(d.lr)}</span></div></div>`;

  drawEllipse(d);
  document.getElementById('btnPNG').disabled=false;
  document.getElementById('btnPDF').disabled=false;
}

function drawEllipse(d){
  const canvas=document.getElementById('cv'); const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height; ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#111827'; ctx.fillRect(0,0,W,H);
  
  const spanX = Math.max(Math.abs(d.h-d.a), Math.abs(d.h+d.a), 4);
  const spanY = Math.max(Math.abs(d.k-d.a), Math.abs(d.k+d.a), 4);
  const sc=Math.min((W/2 - 40)/spanX, (H/2 - 40)/spanY);
  const cx=W/2, cy=H/2; const toC=(x,y)=>[cx + x*sc, cy - y*sc];
  
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  
  const [ecx,ecy]=toC(d.h,d.k); ctx.save(); ctx.translate(ecx,ecy); ctx.beginPath();
  ctx.ellipse(0,0,(d.hor?d.a:d.b)*sc,(d.hor?d.b:d.a)*sc,0,0,Math.PI*2);
  ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
  
  const dot=(x,y,col)=>{ const [px,py]=toC(x,y); ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fillStyle=col; ctx.fill(); };
  dot(d.h,d.k,'#94a3b8'); d.vertices.forEach(v=>dot(...v,'#60a5fa')); d.foci.forEach(f=>dot(...f,'#f59e0b'));
  d.exMinor.forEach(b=>dot(...b,'#34d399')); // Puntos del eje menor agregados al gráfico en verde
}

function exportPNG(){
  const canvas=document.getElementById('cv');
  const a=document.createElement('a'); a.href=canvas.toDataURL('image/png');
  a.download=`elipse_${Date.now()}.png`; a.click();
}

function exportPDF(){
  const d=window._D; if(!d) return;
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    
    // Fondo estilizado completo del PDF
    pdf.setFillColor(10,14,26); pdf.rect(0,0,210,297,'F');
    
    // Encabezado
    pdf.setFont('helvetica','bold'); pdf.setFontSize(16); pdf.setTextColor(96,165,250);
    pdf.text('ANALIZADOR DE ELIPSES PRO',105,20,{align:'center'});
    
    pdf.setFontSize(12); pdf.setTextColor(245,158,11);
    pdf.text(d.hor ? 'Elipse Horizontal' : 'Elipse Vertical',105,28,{align:'center'});
    
    pdf.setFontSize(11); pdf.setTextColor(255,255,255);
    pdf.text(`Ecuacion: ${d.stdEq}`,105,36,{align:'center'});
    
    // Renderizado del Canvas gráfico sin deformación
    const gc=document.getElementById('cv');
    const gImg=gc.toDataURL('image/png');
    pdf.addImage(gImg,'PNG', 15, 45, 180, 120);
    
    // Bloque de datos numéricos detallados completos
    pdf.setFontSize(11); pdf.setTextColor(148,163,184);
    let y = 180;
    const addLine = (label, value) => {
      pdf.setFont('helvetica','bold'); pdf.setTextColor(96,165,250); pdf.text(label, 20, y);
      pdf.setFont('helvetica','normal'); pdf.setTextColor(255,255,255); pdf.text(value, 65, y);
      y += 10;
    };

    addLine('Centro (C):', fc(d.h, d.k));
    addLine('Vertices Eje Mayor (V):', `V1 = ${fc(...d.vertices[0])}  |  V2 = ${fc(...d.vertices[1])}`);
    addLine('Extremos Eje Menor (B):', `B1 = ${fc(...d.exMinor[0])}  |  B2 = ${fc(...d.exMinor[1])}`);
    addLine('Focos (F):', `F1 = ${fc(...d.foci[0])}  |  F2 = ${fc(...d.foci[1])}`);
    addLine('Semiejes fundamentales:', `a = ${fmt(d.a)}  |  b = ${fmt(d.b)}  |  c = ${fmt(d.c)}`);
    addLine('Excentricidad (e):', fmt(d.e));
    addLine('Longitud del Lado Recto:', fmt(d.lr));

    pdf.save(`Reporte_Elipse_${Date.now()}.pdf`);
  } catch(e) { alert('Error en PDF Móvil: '+e.message); }
}
</script>
</body>
</html>
